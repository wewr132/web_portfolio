{% extends 'base.html' %}

{% block content %}
    <div style="border: 1px solid black; padding: 10px; margin-bottom: 10px;">
        <h2>Регистрация</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom: 10px;">
                    <label>{{ field.label }}</label><br>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color: red;">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>
{% endblock %}
